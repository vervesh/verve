name: UI Screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'

concurrency:
  group: ui-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  screenshots:
    name: Capture UI Screenshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build UI
        run: pnpm build

      - name: Take screenshots
        id: playwright
        run: |
          mkdir -p screenshots
          pnpm exec playwright test --project=desktop 2>&1 | tee playwright-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload screenshots as artifact
        if: always()
        id: upload-screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: ui/screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            ui/playwright-output.txt
            ui/e2e/results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Post screenshot comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const screenshotsDir = 'ui/screenshots';
            let files = [];
            try {
              files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png')).sort();
            } catch {
              console.log('No screenshots directory found');
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const marker = '<!-- ui-screenshots-bot -->';
            let body = marker + '\n';

            if (files.length === 0) {
              body += `## UI Screenshots\n\n`;
              body += `No screenshots were captured. Check the [workflow run](${runUrl}) for errors.\n`;
            } else {
              body += `## UI Screenshots\n\n`;
              body += `Captured **${files.length} screenshots** from this PR.\n\n`;
              body += `Screenshots are available as workflow artifacts:\n`;
              body += `- **[View workflow run](${runUrl})** — see the job summary for inline previews\n`;
              body += `- **[Download screenshots](${artifactUrl})** — download the \`ui-screenshots\` artifact\n\n`;
              body += `<details>\n<summary>Screenshot list</summary>\n\n`;
              for (const file of files) {
                const pageName = file.replace('-desktop.png', '').replace(/-/g, ' ');
                body += `- ${pageName}\n`;
              }
              body += `\n</details>\n`;
            }

            body += `\n---\n`;
            body += `*Commit: ${context.sha.substring(0, 7)} | [Workflow run](${runUrl})*`;

            // Find and update existing comment or create new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log('Updated existing screenshot comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              console.log('Created new screenshot comment');
            }

      - name: Write job summary
        if: always()
        working-directory: ui
        run: |
          echo "## UI Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d screenshots ] && [ "$(ls -A screenshots/*.png 2>/dev/null)" ]; then
            COUNT=$(ls screenshots/*.png | wc -l)
            echo "Captured **${COUNT} screenshots** from this PR." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Screenshots are attached as the \`ui-screenshots\` artifact on this workflow run." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### Screenshot list" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for f in screenshots/*.png; do
              name=$(basename "$f" .png | sed 's/-/ /g')
              echo "- ${name}" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No screenshots were captured." >> $GITHUB_STEP_SUMMARY
          fi

          # Append full Playwright output to the summary when tests failed.
          if [ "${{ steps.playwright.outcome }}" = "failure" ] && [ -f playwright-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Playwright Test Failures" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat playwright-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
