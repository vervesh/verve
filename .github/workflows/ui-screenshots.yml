name: UI Screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'

concurrency:
  group: ui-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Capture UI Screenshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --silent

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium > /dev/null 2>&1

      - name: Build UI
        run: pnpm build > build-output.txt 2>&1 || { cat build-output.txt; exit 1; }

      - name: Take screenshots
        id: playwright
        run: |
          mkdir -p screenshots
          pnpm exec playwright test --project=desktop 2>&1 | tee playwright-output.txt
          exit ${PIPESTATUS[0]}

      - name: Print test failure summary
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          echo ""
          echo "=========================================="
          echo "  PLAYWRIGHT TEST FAILURES"
          echo "=========================================="
          echo ""
          if [ -f playwright-output.txt ]; then
            # Show only the failure summary, not the full verbose output
            grep -A 1000 'failed' playwright-output.txt | tail -100 || cat playwright-output.txt | tail -100
          fi

      - name: Push screenshots to orphan branch
        if: always()
        id: push-screenshots
        working-directory: .
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -d ui/screenshots ] || [ -z "$(ls -A ui/screenshots/*.png 2>/dev/null)" ]; then
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          TMPDIR=$(mktemp -d)

          # Clone or create the screenshots branch
          CREATED_BRANCH=false
          if git ls-remote --exit-code --heads "$REPO_URL" screenshots >/dev/null 2>&1; then
            git clone --depth 1 --branch screenshots "$REPO_URL" "$TMPDIR"
          else
            CREATED_BRANCH=true
            git init "$TMPDIR"
            git -C "$TMPDIR" config user.name "github-actions[bot]"
            git -C "$TMPDIR" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$TMPDIR" checkout --orphan screenshots
            echo "# UI Screenshots" > "$TMPDIR/README.md"
            git -C "$TMPDIR" add README.md
            git -C "$TMPDIR" commit -m "chore: initialize screenshots branch"
            git -C "$TMPDIR" remote add origin "$REPO_URL"
          fi

          git -C "$TMPDIR" config user.name "github-actions[bot]"
          git -C "$TMPDIR" config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy screenshots into pr/{number}/
          mkdir -p "$TMPDIR/pr/${PR_NUMBER}"
          cp ui/screenshots/*.png "$TMPDIR/pr/${PR_NUMBER}/"
          git -C "$TMPDIR" add "pr/${PR_NUMBER}"

          if git -C "$TMPDIR" diff --cached --quiet; then
            echo "No screenshot changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            rm -rf "$TMPDIR"
            exit 0
          fi

          git -C "$TMPDIR" commit -m "ci: update screenshots for PR #${PR_NUMBER} [skip ci]"

          # First push of a new orphan branch — no rebase needed
          if [ "$CREATED_BRANCH" = "true" ]; then
            if git -C "$TMPDIR" push -u origin screenshots; then
              echo "pushed=true" >> $GITHUB_OUTPUT
            else
              echo "pushed=false" >> $GITHUB_OUTPUT
            fi
            rm -rf "$TMPDIR"
            exit 0
          fi

          # Retry push with rebase to handle concurrent pushes
          for i in 1 2 3; do
            if git -C "$TMPDIR" push origin screenshots; then
              echo "pushed=true" >> $GITHUB_OUTPUT
              rm -rf "$TMPDIR"
              exit 0
            fi
            echo "Push attempt $i failed, pulling with rebase..."
            git -C "$TMPDIR" pull --rebase origin screenshots
          done

          echo "pushed=false" >> $GITHUB_OUTPUT
          rm -rf "$TMPDIR"

      - name: Post screenshot comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          SCREENSHOTS_PUSHED: ${{ steps.push-screenshots.outputs.pushed }}
        with:
          script: |
            const fs = require('fs');

            const screenshotsDir = 'ui/screenshots';
            let files = [];
            try {
              files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png')).sort();
            } catch {
              console.log('No screenshots directory found');
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- ui-screenshots-bot -->';
            const prNumber = context.payload.pull_request.number;
            const pushed = process.env.SCREENSHOTS_PUSHED === 'true';
            let body = marker + '\n';

            if (files.length === 0) {
              body += `## 📸 UI Screenshots\n\n`;
              body += `No screenshots were captured. Check the [workflow run](${runUrl}) for errors.\n`;
            } else {
              body += `## 📸 UI Screenshots\n\n`;
              body += `Captured **${files.length} screenshots** from this PR.\n\n`;

              if (!pushed) {
                body += `> ⚠️ Screenshots could not be pushed to the branch. Check the [workflow run](${runUrl}).\n\n`;
              }

              // Group screenshots by category (prefix before first hyphen).
              const groups = {};
              for (const file of files) {
                const name = file.replace('.png', '');
                const parts = name.split('-');
                // Category is everything before the last segment (device name)
                // e.g. "task-review-desktop" -> category "task review", label "task review"
                const device = parts[parts.length - 1];
                const category = parts.slice(0, -1).join(' ');

                // Group by top-level category (first word)
                const groupKey = parts[0];
                if (!groups[groupKey]) {
                  groups[groupKey] = [];
                }
                groups[groupKey].push({ file, name, category, device });
              }

              const rawBase = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/screenshots/pr/${prNumber}`;

              for (const [group, items] of Object.entries(groups)) {
                const groupTitle = group.charAt(0).toUpperCase() + group.slice(1);
                body += `### ${groupTitle}\n\n`;

                for (const item of items) {
                  const label = item.category.replace(/-/g, ' ');
                  if (pushed) {
                    body += `<details>\n<summary>${label}</summary>\n\n`;
                    body += `![${label}](${rawBase}/${item.file})\n\n`;
                    body += `</details>\n\n`;
                  } else {
                    body += `- ${label}\n`;
                  }
                }
              }
            }

            body += `\n---\n`;
            body += `*[Workflow run](${runUrl})*`;

            // Find and update existing comment or create new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log('Updated existing screenshot comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              console.log('Created new screenshot comment');
            }

      - name: Write job summary
        if: always()
        working-directory: ui
        env:
          SCREENSHOTS_PUSHED: ${{ steps.push-screenshots.outputs.pushed }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "## UI Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d screenshots ] && [ "$(ls -A screenshots/*.png 2>/dev/null)" ]; then
            COUNT=$(ls screenshots/*.png | wc -l)
            echo "Captured **${COUNT} screenshots** from this PR." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            RAW_BASE="https://raw.githubusercontent.com/${{ github.repository }}/screenshots/pr/${PR_NUMBER}"

            if [ "$SCREENSHOTS_PUSHED" = "true" ]; then
              for f in screenshots/*.png; do
                name=$(basename "$f" .png | sed 's/-/ /g')
                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary>${name}</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "![${name}](${RAW_BASE}/$(basename "$f"))" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              done
            else
              echo "Screenshots could not be pushed to branch." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Screenshot list" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              for f in screenshots/*.png; do
                name=$(basename "$f" .png | sed 's/-/ /g')
                echo "- ${name}" >> $GITHUB_STEP_SUMMARY
              done
            fi
          else
            echo "No screenshots were captured." >> $GITHUB_STEP_SUMMARY
          fi

          # Append full Playwright output to the summary when tests failed.
          if [ "${{ steps.playwright.outcome }}" = "failure" ] && [ -f playwright-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Playwright Test Failures" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat playwright-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: ui/screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            ui/playwright-output.txt
            ui/e2e/results/
          retention-days: 30
          if-no-files-found: ignore
